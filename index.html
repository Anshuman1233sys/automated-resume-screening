<!DOCTYPE html>
<html>
<head>
    <title>Automated Resume Screening</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            margin: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }
        input {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    <h2>Automated Resume Screening System</h2>
</header>

<div class="container">

    <div class="card">
        <h3>Upload Resume</h3>
        <input type="file" id="resumeInput">
        <br><br>
        <button onclick="processResume()">Upload & Process</button>
    </div>

    <div class="card">
        <h3>Results</h3>
        <p id="output">No results yet...</p>
    </div>

</div>

<script>
function processResume() {
    document.getElementById("output").innerHTML =
        "Resume processed successfully. Candidate matched with required skills (Python).";
}
</script>

</body>
</html>
